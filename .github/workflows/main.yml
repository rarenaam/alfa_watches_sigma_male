name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Zorg dat Node.js klaarstaat op de server
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. Installeer de pakketten en bouw het Vite project
      - name: Install and Build
        run: |
          cd client
          npm install
          npm run build

      # 3. Configureer GitHub Pages
      - uses: actions/configure-pages@v5

      # 4. Upload de gebouwde map (./client/dist)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./client

      # 5. Zet de site live
      - uses: actions/deploy-pages@v4
