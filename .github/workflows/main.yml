name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Zorg dat Node.js klaarstaat
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. Installeer en bouw de site IN de client map
      - name: Install and Build
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run build

      # 3. Activeer Pages
      - uses: actions/configure-pages@v5

      # 4. Upload het resultaat dat direct in de hoofdmap naast client staat (./dist)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 5. Zet de site live
      - uses: actions/deploy-pages@v4
